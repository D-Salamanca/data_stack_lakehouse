# ============================================================
# docker-compose.yaml — Proyecto 2 FHBD (OPTIMIZADO)
# Arquitectura Lakehouse: StackOverflow → Bronze → Silver → Gold
#
# Cambios vs versión original:
#   - Airflow: CeleryExecutor → LocalExecutor
#     (se elimina redis, airflow-worker, airflow-triggerer, flower)
#   - Dremio: 4→2 GB heap, límite 2.5 GB
#   - Spark: solo master (local[*] en los jobs) → se elimina spark-worker
#   - Trino: heap 1 GB (/trino/etc/jvm.config)
#
# Servicios:
#   Orquestación : airflow-webserver, airflow-scheduler, postgres
#   Procesamiento: spark-master (single-node)
#   Almacenamiento: minio, nessie
#   Consulta     : trino (Silver), dremio (Gold)
#   Desarrollo   : jupyter
#
# Puertos:
#   8080 Airflow · 8081 Spark · 8888 Jupyter · 9000/9001 MinIO
#   9047 Dremio · 8090 Trino · 19120 Nessie
# ============================================================

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: proyecto2-airflow:2.10.3
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'

    SPARK_HOME: '/opt/spark'

    MINIO_ENDPOINT: '${MINIO_ENDPOINT:-http://proyecto2-minio:9000}'
    MINIO_ACCESS_KEY: '${MINIO_ACCESS_KEY:-minioadmin}'
    MINIO_SECRET_KEY: '${MINIO_SECRET_KEY:-minioadmin123}'
    MINIO_BUCKET_BRONZE: '${MINIO_BUCKET_BRONZE:-bronze}'
    MINIO_BUCKET_ICEBERG: '${MINIO_BUCKET_ICEBERG:-iceberg}'

    NESSIE_URL: '${NESSIE_URL:-http://proyecto2-nessie:19120/api/v1}'
    NESSIE_BRANCH: '${NESSIE_BRANCH:-main}'

    BRONZE_NAMESPACE: 'bronze'
    SILVER_NAMESPACE: 'silver'
    GOLD_NAMESPACE: 'gold'

    CH_HOST: 'play.clickhouse.com'
    CH_PORT: '443'
    CH_USER: 'play'
    CH_PASSWORD: ''
    CH_DB: 'stackoverflow'

    _PIP_ADDITIONAL_REQUIREMENTS: '${_PIP_ADDITIONAL_REQUIREMENTS:-}'

  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
    - ${AIRFLOW_PROJ_DIR:-.}/scripts:/opt/airflow/scripts
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
  networks:
    - proyecto2-network

services:

  # ----------------------------------------------------------
  # AIRFLOW
  # ----------------------------------------------------------

  postgres:
    image: postgres:13
    container_name: proyecto2-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - proyecto2-network

  airflow-init:
    <<: *airflow-common
    container_name: proyecto2-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/scripts /sources/data /sources/notebooks
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins,scripts,data,notebooks}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: '${_AIRFLOW_WWW_USER_USERNAME:-airflow}'
      _AIRFLOW_WWW_USER_PASSWORD: '${_AIRFLOW_WWW_USER_PASSWORD:-airflow}'
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources

  airflow-webserver:
    <<: *airflow-common
    container_name: proyecto2-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
      nessie:
        condition: service_started
      spark-master:
        condition: service_started

  airflow-scheduler:
    <<: *airflow-common
    container_name: proyecto2-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ----------------------------------------------------------
  # SPARK (single-node, jobs corren en local[*])
  # ----------------------------------------------------------

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: proyecto2-spark:3.5.5
    container_name: proyecto2-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8081
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_DAEMON_MEMORY=512m
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - AWS_REGION=us-east-1
    ports:
      - "7077:7077"
      - "8081:8081"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/scripts:/opt/spark/scripts
      - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/spark/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8081"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: always
    networks:
      - proyecto2-network
    depends_on:
      - minio
      - nessie

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: proyecto2-spark:3.5.5
    container_name: proyecto2-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8082
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - AWS_REGION=us-east-1
    ports:
      - "8082:8082"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/scripts:/opt/spark/scripts
      - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/spark/data
    restart: always
    networks:
      - proyecto2-network
    depends_on:
      - spark-master

  # ----------------------------------------------------------
  # MinIO
  # ----------------------------------------------------------

  minio:
    image: minio/minio:latest
    container_name: proyecto2-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: '${MINIO_ACCESS_KEY:-minioadmin}'
      MINIO_ROOT_PASSWORD: '${MINIO_SECRET_KEY:-minioadmin123}'
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - proyecto2-network

  # ----------------------------------------------------------
  # Nessie
  # ----------------------------------------------------------

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: proyecto2-nessie
    user: root
    ports:
      - "19120:19120"
    environment:
      - NESSIE_SERVER_AUTHENTICATION_ENABLED=false
      - QUARKUS_HTTP_PORT=19120
      - NESSIE_VERSION_STORE_TYPE=ROCKSDB
      - NESSIE_VERSION_STORE_PERSIST_ROCKS_DB_DATABASE_PATH=/nessie/data
      - NESSIE_CATALOG_DEFAULT_WAREHOUSE=warehouse
      - NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION=s3://iceberg
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION=us-east-1
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT=http://proyecto2-minio:9000
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS=true
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE=application-global
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - AWS_REGION=us-east-1
    volumes:
      - nessie_data:/nessie/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:19120/api/v1/config"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: always
    networks:
      - proyecto2-network
    depends_on:
      minio:
        condition: service_healthy

  # ----------------------------------------------------------
  # Trino (heap limitado a 1 GB vía trino/etc/jvm.config)
  # ----------------------------------------------------------

  trino:
    image: trinodb/trino:438
    container_name: proyecto2-trino
    ports:
      - "8090:8080"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/trino/etc:/etc/trino
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/v1/info"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: always
    networks:
      - proyecto2-network
    depends_on:
      nessie:
        condition: service_healthy

  # ----------------------------------------------------------
  # Dremio (heap 4 GB — mínimo requerido por Dremio)
  # ----------------------------------------------------------

  dremio:
    image: dremio/dremio-oss:latest
    container_name: proyecto2-dremio
    ports:
      - "9047:9047"
      - "31010:31010"
      - "32010:32010"
    environment:
      - DREMIO_MAX_MEMORY_SIZE_MB=4096
    volumes:
      - dremio_data:/opt/dremio/data
    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9047"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    restart: always
    networks:
      - proyecto2-network
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy

  # ----------------------------------------------------------
  # Jupyter
  # ----------------------------------------------------------

  jupyter:
    image: jupyter/base-notebook:latest
    container_name: proyecto2-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=fhbd
      - MINIO_ENDPOINT=http://proyecto2-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - MINIO_BUCKET_BRONZE=bronze
      - MINIO_BUCKET_ICEBERG=iceberg
      - NESSIE_URL=http://proyecto2-nessie:19120/api/v1
      - NESSIE_BRANCH=main
      - SILVER_NAMESPACE=silver
      - GOLD_NAMESPACE=gold
      - SPARK_MASTER=spark://spark-master:7077
      - CH_HOST=play.clickhouse.com
      - CH_PORT=443
      - CH_USER=play
      - CH_DB=stackoverflow
    volumes:
      - ./scripts:/home/jovyan/scripts
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - ./requirements.txt:/home/jovyan/requirements.txt:ro
      - ./.env:/home/jovyan/.env
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    command: >
      bash -lc "pip install --no-cache-dir -r /home/jovyan/requirements.txt &&
      start-notebook.py --NotebookApp.token=$${JUPYTER_TOKEN}"
    restart: always
    networks:
      - proyecto2-network

volumes:
  postgres-db-volume:
  minio_data:
  nessie_data:
  dremio_data:

networks:
  proyecto2-network:
    driver: bridge
    name: proyecto2-network
